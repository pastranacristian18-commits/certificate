<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adoption Certificate</title>

<!-- ===================== AGREGADO ===================== -->
<!-- html2pdf.js (incluye jsPDF + html2canvas) para generar el PDF
     directamente en el navegador, sin diálogo de impresión del sistema.
     Esto da el MISMO resultado en Windows, Mac, Android e iPhone,
     porque el render se hace por canvas y no depende del motor de
     impresión de cada sistema operativo. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<!-- ======================================================= -->

<style>
  html, body{
    margin:0;
    padding:0;
    background:#d9d9d9;
    font-family:Arial, Helvetica, sans-serif;
  }
  body{
    /* CAMBIO: antes "min-height:100vh" dejaba una franja blanca grande
       debajo del certificado en pantallas altas (como en móviles),
       porque el body se estiraba a toda la altura visible aunque el
       certificado fuera más corto. Ahora el body solo mide lo que
       necesita su contenido. */
    min-height:auto;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:18px;
  }
  .topbar{
    width:min(1200px,100%);
    margin:0 auto 12px auto;
    display:flex;
    justify-content:flex-end;
    gap:10px; /* AGREGADO: separación entre los 2 botones */
  }
  .btn{
    appearance:none;
    border:none;
    background:#111;
    color:#fff;
    cursor:pointer;
    padding:12px 18px;
    border-radius:999px;
    font-size:14px;
    font-weight:700;
  }
  /* AGREGADO: botón secundario de respaldo (imprimir), visualmente
     discreto para no alterar la jerarquía del diseño original */
  .btn-secondary{
    background:#fff;
    color:#111;
    border:2px solid #111;
  }

  /* -------- TAMAÑO EN PANTALLA (responsive, igual que antes) -------- */
  .sheet{
    position:relative;
    width:min(1200px,100%);
    aspect-ratio: 1536 / 942;
    box-shadow:0 20px 40px rgba(0,0,0,.18);
    overflow:hidden;
    background:#eef3f3;
  }
  .bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover; /* ya estaba: clave para encajar en Carta sin deformar */
    z-index:1;
    user-select:none;
    pointer-events:none;
  }
  .layer{
    position:absolute;
    inset:0;
    z-index:2;
  }
  .recipient{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    width:27%;
    text-align:center;
    color:#111;
    word-break:break-word;
    top:38%;
    font-size:2.2rem;
    line-height:1.15;
    font-family:Georgia, "Times New Roman", serif;
    font-weight:700;
  }
  .plantName{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    width:41%;
    text-align:center;
    color:#111;
    word-break:break-word;
    top:58%;
    font-size:2.0rem;
    line-height:1.22;
    font-family:Georgia, "Times New Roman", serif;
    font-weight:700;
  }

  /* -------- IMPRESIÓN DE RESPALDO (con medidas físicas reales) -------- */
  @page{
    size: letter landscape;
    margin: 0;
  }
  @media print{
    html, body{
      width:11in;
      height:8.5in;
      background:#fff !important;
      margin:0;
      padding:0;
      /* CAMBIO: en vez de "display:block" estirando el .sheet a toda
         la hoja (lo que obligaba a recortar la imagen con cover),
         ahora centramos el certificado dentro de la hoja con flexbox.
         Esto genera automáticamente el mismo margen arriba/abajo y
         el mismo margen izquierda/derecha, sin recortar ni deformar
         nada — se ve como una tarjeta centrada a propósito. */
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .topbar{ display:none !important; }
    .sheet{
      /* CAMBIO: en vez de width:auto/height:auto + aspect-ratio
         (que Safari/iOS no siempre calcula bien dentro de un flex
         container), se calcula explícitamente con min() el tamaño
         máximo que cabe dentro de 11in x 8.5in conservando la
         proporción real de la imagen (1536/942). Esto es 100%
         predecible en Chrome, Edge, Safari y Firefox por igual. */
      width:min(11in, 8.5in * 1536 / 942);
      height:min(8.5in, 11in * 942 / 1536);
      box-shadow:none;
      margin:0;
    }
  }

  @media (max-width: 900px){
    .recipient{ font-size:1.4rem; }
    .plantName{ font-size:1.2rem; }
  }

  /* ===================== AGREGADO ===================== */
  /* Contenedor oculto, fuera de pantalla, usado SOLO para generar
     el PDF con html2pdf. Tiene el tamaño físico exacto de una hoja
     Carta horizontal (11in x 8.5in) y centra el certificado dentro
     de ella con flexbox, dejando el mismo margen arriba/abajo y el
     mismo margen izquierda/derecha (como una tarjeta enmarcada),
     sin recortar ni deformar el diseño original. */
  #pdf-render-zone{
    position:absolute;
    top:-99999px;
    left:-99999px;
    width:11in;
    height:8.5in;
    background:#ffffff;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #pdf-render-zone .sheet{
    width:min(11in, 8.5in * 1536 / 942);
    height:min(8.5in, 11in * 942 / 1536);
    box-shadow:none;
  }
  /* ======================================================= */
</style>
</head>
<body>

<div class="topbar">
  <!-- CAMBIO: el botón principal ahora llama a generarPDF() en vez de window.print() -->
  <button class="btn" onclick="generarPDF()">Download / Save PDF</button>
  <!-- AGREGADO: respaldo, por si el usuario prefiere imprimir manualmente -->
  <button class="btn btn-secondary" onclick="window.print()">Imprimir</button>
</div>

<div class="sheet" id="sheet-visible">
  <img class="bg" src="background.png" alt="Adoption Certificate">
  <div class="layer">
    <div class="recipient" id="recipient"></div>
    <div class="plantName" id="plantName"></div>
  </div>
</div>

<!-- ===================== AGREGADO ===================== -->
<!-- Zona oculta donde se clona el certificado con tamaño físico fijo
     antes de convertirlo a PDF. No es visible para el usuario. -->
<div id="pdf-render-zone" aria-hidden="true"></div>
<!-- ======================================================= -->

<script>
  function qs(name){
    const params = new URLSearchParams(window.location.search);
    return params.get(name) || "";
  }
  function clean(value){
    const v = String(value || "").trim();
    if (!v) return "";
    if (v.includes("{{")) return "";
    return decodeURIComponent(v.replace(/\+/g, " "));
  }
  const recipientName   = clean(qs("nombre"));
  const frailejonName   = clean(qs("frailejon"));
  const nativePlantName = clean(qs("planta"));

  // — Recipient name —
  document.getElementById("recipient").textContent = recipientName;

  // — Plant name(s) — conditional, shows only once —
  if (frailejonName && nativePlantName) {
    document.getElementById("plantName").textContent =
      frailejonName + "  |  " + nativePlantName;
  } else if (frailejonName) {
    document.getElementById("plantName").textContent = frailejonName;
  } else if (nativePlantName) {
    document.getElementById("plantName").textContent = nativePlantName;
  }
  // If neither applies, div stays empty and clean

  /* ===================== AGREGADO ===================== */
  /*
    generarPDF():
    1. Clona el nodo .sheet (ya con el texto del certificado insertado)
       dentro de #pdf-render-zone, que tiene tamaño físico fijo
       (11in x 8.5in = tamaño real de una hoja Carta horizontal).
    2. Usa html2pdf.js (html2canvas + jsPDF) para "fotografiar" ese
       clon en alta resolución y exportarlo como PDF con formato
       Carta horizontal, sin márgenes.
    3. Como el render es por canvas, el resultado es visualmente
       idéntico sin importar el navegador o sistema operativo desde
       el que se genere.
  */
  function generarPDF(){
    const original = document.getElementById('sheet-visible');
    const zone = document.getElementById('pdf-render-zone');

    // Limpiar y clonar el certificado actual (con sus datos ya cargados)
    zone.innerHTML = '';
    const clone = original.cloneNode(true);
    clone.id = 'sheet-pdf-clone';
    zone.appendChild(clone);

    const opciones = {
      margin: 0,
      filename: (recipientName ? recipientName.replace(/\s+/g,'_') + '_certificado' : 'certificado') + '.pdf',
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: {
        scale: 3,            // alta resolución para impresión nítida
        useCORS: true,       // permite cargar background.png correctamente
        allowTaint: false,
        backgroundColor: '#ffffff'
      },
      jsPDF: {
        unit: 'in',
        format: 'letter',
        orientation: 'landscape'
      }
    };

    // Esperamos a que la imagen de fondo esté completamente cargada
    // antes de capturar, para evitar un PDF con el fondo en blanco.
    const bgImg = clone.querySelector('.bg');
    const render = () => {
      // CAMBIO IMPORTANTE: se captura "zone" completa (11in x 8.5in,
      // fondo blanco + certificado ya centrado por CSS) en vez de
      // capturar solo "clone" (el certificado suelto). Así el
      // centrado con margen simétrico queda grabado dentro de la
      // imagen capturada, y el PDF resultante queda exactamente
      // igual sin importar cómo html2pdf posicione internamente
      // un fragmento más pequeño que la hoja.
      html2pdf().set(opciones).from(zone).save();
    };

    if (bgImg.complete) {
      render();
    } else {
      bgImg.onload = render;
      bgImg.onerror = render; // genera igual aunque falle la imagen
    }
  }
  /* ======================================================= */
</script>
</body>
</html>
