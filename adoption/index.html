<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adoption Certificate</title>

<style>

html,body{
margin:0;
padding:0;
background:#d9d9d9;
font-family:Arial,Helvetica,sans-serif;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding:18px;
}

.topbar{
width:min(1200px,100%);
margin:0 auto 12px auto;
display:flex;
justify-content:flex-end;
}

.btn{
appearance:none;
border:none;
background:#111;
color:#fff;
cursor:pointer;
padding:12px 18px;
border-radius:999px;
font-size:14px;
font-weight:700;
}

.sheet{
position:relative;
width:min(1200px,100%);
aspect-ratio:1536/942;
box-shadow:0 20px 40px rgba(0,0,0,.18);
overflow:hidden;
background:#eef3f3;
}

.bg{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:1;
pointer-events:none;
user-select:none;
}

.layer{
position:absolute;
inset:0;
z-index:2;
}

.recipient,
.adoptionType,
.plantName{
position:absolute;
left:50%;
transform:translateX(-50%);
width:72%;
text-align:center;
color:#111;
word-break:break-word;
}

.recipient{
top:35.3%;
font-size:2.15rem;
font-family:Georgia,"Times New Roman",serif;
font-weight:700;
line-height:1.15;
}

.adoptionType{
top:51.3%;
font-size:2.05rem;
font-family:Georgia,"Times New Roman",serif;
font-weight:700;
line-height:1.2;
}

.plantName{
top:65.3%;
font-size:2rem;
font-family:Georgia,"Times New Roman",serif;
font-weight:700;
line-height:1.2;
}

.hidden{
display:none!important;
}

@page{
size:letter landscape;
margin:0;
}

@media print{

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:white;
}

.topbar{
display:none;
}

.sheet{
width:100vw;
box-shadow:none;
}

}

</style>

</head>

<body>

<div class="topbar">
<button class="btn" onclick="window.print()">Download PDF</button>
</div>

<div class="sheet">

<img class="bg"
src="background.png"
alt="Adoption Certificate">

<div class="layer">

<div
class="recipient"
id="recipient">
Recipient
</div>

<div
class="adoptionType"
id="adoptionType">
Adoption
</div>

<div
class="plantName"
id="plantName">
Plant Name
</div>

</div>

</div>

<script>

function qs(name){
    const params = new URLSearchParams(window.location.search);
    return params.get(name) || "";
}

function clean(value){
    const v = String(value || "").trim();

    if(!v) return "";

    if(v.includes("{{")) return "";

    return decodeURIComponent(v.replace(/\+/g," "));
}

/* Parameters received from Afrus */

const recipientName = clean(qs("nombre"));
const frailejonName = clean(qs("frailejon"));
const nativePlantName = clean(qs("planta"));

/* HTML Elements */

const recipientEl = document.getElementById("recipient");
const adoptionTypeEl = document.getElementById("adoptionType");
const plantNameEl = document.getElementById("plantName");

/* Recipient */

recipientEl.textContent = recipientName || "Recipient";

/* Adoption Type */

if(frailejonName && nativePlantName){

    adoptionTypeEl.textContent = "Frailejón & Native Plant";

}else if(frailejonName){

    adoptionTypeEl.textContent = "Frailejón";

}else if(nativePlantName){

    adoptionTypeEl.textContent = "Native Plant";

}else{

    adoptionTypeEl.textContent = "Adoption";

}

/* Plant Name */

if(frailejonName && nativePlantName){

    plantNameEl.textContent =
        frailejonName + " | " + nativePlantName;

}else if(frailejonName){

    plantNameEl.textContent =
        frailejonName;

}else if(nativePlantName){

    plantNameEl.textContent =
        nativePlantName;

}else{

    plantNameEl.textContent =
        "Plant Name";

}

</script>
