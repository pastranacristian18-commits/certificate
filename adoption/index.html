<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adoption Certificate</title>
<style>
  html, body{
    margin:0;
    padding:0;
    background:#d9d9d9;
    font-family:Arial, Helvetica, sans-serif;
  }

  body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:18px;
  }

  .topbar{
    width:min(1200px,100%);
    margin:0 auto 12px auto;
    display:flex;
    justify-content:flex-end;
  }

  .btn{
    appearance:none;
    border:none;
    background:#111;
    color:#fff;
    cursor:pointer;
    padding:12px 18px;
    border-radius:999px;
    font-size:14px;
    font-weight:700;
  }

  .sheet{
    position:relative;
    width:min(1200px,100%);
    aspect-ratio: 1536 / 942;
    box-shadow:0 20px 40px rgba(0,0,0,.18);
    overflow:hidden;
    background:#eef3f3;
  }

  .bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:1;
    user-select:none;
    pointer-events:none;
  }

  .layer{
    position:absolute;
    inset:0;
    z-index:2;
  }

  .recipient{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    width:60%;
    text-align:center;
    color:#111;
    word-break:break-word;
    top:30%;
    font-size:2.2rem;
    line-height:1.15;
    font-family:Georgia, "Times New Roman", serif;
    font-weight:700;
  }

  .plantName{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    width:85%;
    text-align:center;
    color:#111;
    word-break:break-word;
    top:44%;
    font-size:2.0rem;
    line-height:1.22;
    font-family:Georgia, "Times New Roman", serif;
    font-weight:700;
  }

  @page{
    size: letter landscape;
    margin: 0;
  }

  @media print{
    html, body{
      width:100%;
      height:100%;
      background:#fff !important;
      margin:0;
      padding:0;
      display:block;
    }
    .topbar{ display:none !important; }
    .sheet{
      width:100vw;
      height:auto;
      box-shadow:none;
      margin:0;
    }
  }

  @media (max-width: 900px){
    .recipient{ font-size:1.4rem; }
    .plantName{ font-size:1.2rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <button class="btn" onclick="window.print()">Download / Save PDF</button>
</div>

<div class="sheet">
  <img class="bg" src="background.png" alt="Adoption Certificate">

  <div class="layer">
    <div class="recipient" id="recipient"></div>
    <div class="plantName" id="plantName"></div>
  </div>
</div>

<script>
  function qs(name){
    const params = new URLSearchParams(window.location.search);
    return params.get(name) || "";
  }

  function clean(value){
    const v = String(value || "").trim();
    if (!v) return "";
    if (v.includes("{{")) return "";
    return decodeURIComponent(v.replace(/\+/g, " "));
  }

  const recipientName   = clean(qs("nombre"));
  const frailejonName   = clean(qs("frailejon"));
  const nativePlantName = clean(qs("planta"));

  // — Recipient name —
  document.getElementById("recipient").textContent = recipientName;

  // — Plant name(s) — conditional, shows only once —
  if (frailejonName && nativePlantName) {
    document.getElementById("plantName").textContent =
      frailejonName + "  |  " + nativePlantName;
  } else if (frailejonName) {
    document.getElementById("plantName").textContent = frailejonName;
  } else if (nativePlantName) {
    document.getElementById("plantName").textContent = nativePlantName;
  }
  // If neither applies, div stays empty and clean
</script>

</body>
</html>
